<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="150">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="C:\Users\Santhosh\Desktop\kamali project\image\student logo.png">
  <title>Students</title>
</head>
<body>
    
    <div class="container">
        <form id="applicationForm">
        <img src="C:\Users\Santhosh\Desktop\kamali project\image\student logo.png" width="50px" height="50px">
          <h2>Apply Letters</h2>
      
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
      
          <label for="rollNumber">Roll Number:</label>
          <input type="text" id="rollNumber" name="rollNumber" required>

          <label for="year">Year</label>
          <select id="year" name="year" required>
            <option value="Select">Select</option>
            <option value="1-YEAR">1-Year</option>
            <option value="2-YEAR">2-Year</option>
          </select>
      

          <label for="date">Date:</label>
          <input type="date" id="date" name="date" required>
      
          <label for="email">Email ID:</label>
          <input type="email" id="email" name="email" required>
      
          <label for="nature">Nature of Letter:</label>
          <select id="nature" name="nature" required>
            <option value="Select">Select</option>
            <option value="onDuty">On Duty</option>
            <option value="permission">Permission</option>
            <option value="industrialVisit">Industrial Visit</option>
            <option value="apology">Apology</option>
          </select>
      
          <label for="reason">Reason:</label>
          <textarea id="reason" name="reason" rows="4" ></textarea>
      
          <label for="proof">Proof (Choose File):</label>
          <input type="file" id="proof" name="proof" accept=".pdf, .doc, .docx" >
      
          <button type="button" id="submitBtn" onclick="submitForm()">Submit</button>
        </form>
        
      </div>
    <script src="myscript.js"></script>
</body>
</html>
