    <div class="container">
      <h2>Teacher Approval</h2>
    
      <p>Please review the letter:</p>
      <pre id="generatedLetter"></pre>
    
      <button onclick="approveLetter()">Approve</button>
      <button onclick="rejectLetter()">Reject</button>
    </div>
    
    <script>
    // Load letter content from local storage
    const letterContent = localStorage.getItem('letterContent');
    document.getElementById('generatedLetter').innerText = letterContent;
    
    function approveLetter() {
      // Update approval status to 'approved'
      localStorage.setItem('approvalStatus', 'approved');
    
      // Update teacher permission to 'granted'
      localStorage.setItem('teacherPermission', 'granted');
    
      alert('Permission granted. You can view the letter on this page.');
    }
    
    function rejectLetter() {
      // Update approval status to 'rejected'
      localStorage.setItem('approvalStatus', 'rejected');
    
      // Update teacher permission to 'rejected'
      localStorage.setItem('teacherPermission', 'rejected');
    
      alert('Permission rejected. Please wait for teacher approval.');
    }
  </script>
